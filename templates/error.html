{% extends "base.html" %}
{% block title %}Upload Error{% endblock %}
{% block shell_class %}shell--narrow{% endblock %}
{% block content %}
      <section class="error-panel" aria-labelledby="error-title">
        <p class="eyebrow">Upload Error</p>
        <h1 id="error-title">Please upload a valid image</h1>
        <p>{{ message }}</p>
        <a class="primary-button" href="{{ url_for('index') }}">Return to Upload</a>
      </section>
{% endblock %}
