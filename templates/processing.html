{% extends "base.html" %}
{% block title %}Processing Result...{% endblock %}
{% block content %}
      <section class="result-hero" aria-labelledby="processing-title">
        <h1 id="processing-title">Analyzing Image...</h1>
        <div class="guidance" aria-label="Status message">
          <p>Please wait while the model processes your image. This may take a moment.</p>
        </div>
      </section>

      <!-- Auto-refresh every 2 seconds to check status -->
      <meta http-equiv="refresh" content="2;url={{ url_for('status', task_id=task_id) }}">

      <style>
        .result-hero {
          text-align: center;
          padding: 4rem 1rem;
        }
        
        /* Simple CSS spinner */
        .spinner {
          margin: 2rem auto;
          width: 50px;
          height: 50px;
          border: 5px solid var(--border-color);
          border-top: 5px solid var(--primary-color);
          border-radius: 50%;
          animation: spin 1s linear infinite;
        }

        @keyframes spin {
          0% { transform: rotate(0deg); }
          100% { transform: rotate(360deg); }
        }
      </style>

      <div class="spinner" aria-hidden="true"></div>
{% endblock %}
